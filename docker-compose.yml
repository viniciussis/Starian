version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: starian_pgvector
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-starian_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: starian_api
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-starian_db}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      NODE_ENV: production
    depends_on:
      - db
    restart: unless-stopped

  spa-people:
    build:
      context: .
      dockerfile: spa-people/Dockerfile
    container_name: starian_spa
    ports:
      - "8080:8080"
    depends_on:
      - api
    restart: unless-stopped

  root-config:
    build:
      context: .
      dockerfile: root-config/Dockerfile
    container_name: starian_root
    ports:
      - "9000:9000"
    depends_on:
      - api
      - spa-people
    restart: unless-stopped

volumes:
  pgdata:
